# .github/release.yml

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
      - dependabot[bot]
      - pre-commit-ci
      - pre-commit-ci[bot]
      - github-actions

  categories:
    - title: Bugfixes 🛠
      labels:
        - bug
    - title: New Features 🎉
      labels:
        - enhancement
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "🧪 Tests"
      labels:
        - test
    - title: "🔧 Maintenance"
      labels:
        - chore
        - refactor
        - maintenance
        - ci
        - build
    - title: "⬆️ Dependency Updates"
      labels:
        - dependencies
    - title: "🧩 Other Changes"
      labels:
        - "*"
